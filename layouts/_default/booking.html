<!DOCTYPE html>
<html lang="de">

<head>
  {{- partial "head.html" . -}}
  <meta name="description" content="{{ .Site.Params.homepage_meta_tags.meta_og_description }}" />
  <meta property="og:title" content="{{ .Site.Params.homepage_meta_tags.meta_og_title }}" />
  <meta property="og:type" content="{{ .Site.Params.homepage_meta_tags.meta_og_type }}" />
  <meta property="og:url" content="{{ .Site.Params.homepage_meta_tags.meta_og_url }}" />
  <meta property="og:image" content="{{ .Site.Params.homepage_meta_tags.meta_og_image }}" />
  <meta property="og:description" content="{{ .Site.Params.homepage_meta_tags.meta_og_description }}" />
  <meta name="twitter:card" content="{{ .Site.Params.homepage_meta_tags.meta_twitter_card }}" />
  <meta name="twitter:site" content="{{ .Site.Params.homepage_meta_tags.meta_twitter_site }}" />
  <meta name="twitter:creator" content="{{ .Site.Params.homepage_meta_tags.meta_twitter_creator }}" />

  <link rel="stylesheet" href="css/open-street-maps.css">

  <style>
    /* TODO remove font and replace with locally stored font. */
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@100;200;300;400;500;600;700&display=swap');

    :root {
      --calendar-bg-color: #262829;
      --calendar-font-color: #FFF;
      --weekdays-border-bottom-color: #404040;
      --calendar-date-hover-color: #505050;
      --calendar-current-date-color: #1b1f21;
      --calendar-today-color: linear-gradient(to bottom, #03a9f4, #2196f3);
      --calendar-booked-color: linear-gradient(to top, red, rgb(0, 100, 100)); 
      --calendar-today-innerborder-color: transparent;
      --calendar-nextprev-bg-color: transparent;
      --next-prev-arrow-color: #FFF;
      --calendar-border-radius: 16px;
      --calendar-prevnext-date-color: #484848
    }

    * {
      padding: 0;
      margin: 0;
    }

    .calendar {
      font-family: 'IBM Plex Sans', sans-serif;
      position: relative;
      max-width: 400px;
      /*change as per your design need */
      min-width: 320px;
      background: var(--calendar-bg-color);
      color: var(--calendar-font-color);
      margin: 20px auto;
      box-sizing: border-box;
      overflow: hidden;
      font-weight: normal;
      border-radius: var(--calendar-border-radius);
    }

    .calendar-inner {
      padding: 10px 10px;
    }

    .calendar .calendar-inner .calendar-body {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
    }

    .calendar .calendar-inner .calendar-body div {
      padding: 4px;
      min-height: 30px;
      line-height: 30px;
      border: 1px solid transparent;
      margin: 10px 2px 0px;
    }

    .calendar .calendar-inner .calendar-body div:nth-child(-n+7) {
      border: 1px solid transparent;
      border-bottom: 1px solid var(--weekdays-border-bottom-color);
    }

    .calendar .calendar-inner .calendar-body div:nth-child(-n+7):hover {
      border: 1px solid transparent;
      border-bottom: 1px solid var(--weekdays-border-bottom-color);
    }

    .calendar .calendar-inner .calendar-body div>a {
      color: var(--calendar-font-color);
      text-decoration: none;
      display: flex;
      justify-content: center;
    }

    .calendar .calendar-inner .calendar-body div:hover {
      border: 1px solid var(--calendar-date-hover-color);
      border-radius: 4px;
    }

    .calendar .calendar-inner .calendar-body div.empty-dates:hover {
      border: 1px solid transparent;
    }

    .calendar .calendar-inner .calendar-controls {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
    }

    .calendar .calendar-inner .calendar-today-date {
      display: grid;
      text-align: center;
      cursor: pointer;
      margin: 3px 0px;
      background: var(--calendar-current-date-color);
      padding: 8px 0px;
      border-radius: 10px;
      width: 80%;
      margin: auto;
    }

    .calendar .calendar-inner .calendar-controls .calendar-year-month {
      display: flex;
      min-width: 100px;
      justify-content: space-evenly;
      align-items: center;
    }

    .calendar .calendar-inner .calendar-controls .calendar-next {
      text-align: right;
    }

    .calendar .calendar-inner .calendar-controls .calendar-year-month .calendar-year-label,
    .calendar .calendar-inner .calendar-controls .calendar-year-month .calendar-month-label {
      font-weight: 500;
      font-size: 20px;
    }

    .calendar .calendar-inner .calendar-body .calendar-today {
      background: var(--calendar-today-color);
      border-radius: 4px;
    }
    
    /* written myself */
    .calendar-booked {
      background: var(--calendar-today-color);
      border-radius: 4px;
    }

    .calendar .calendar-inner .calendar-body .calendar-today:hover {
      border: 1px solid transparent;
    }

    .calendar .calendar-inner .calendar-body .calendar-today a {
      outline: 2px solid var(--calendar-today-innerborder-color);
    }

    .calendar .calendar-inner .calendar-controls .calendar-next a,
    .calendar .calendar-inner .calendar-controls .calendar-prev a {
      color: var(--calendar-font-color);
      font-family: arial, consolas, sans-serif;
      font-size: 26px;
      text-decoration: none;
      padding: 4px 12px;
      display: inline-block;
      background: var(--calendar-nextprev-bg-color);
      margin: 10px 0 10px 0;
    }

    .calendar .calendar-inner .calendar-controls .calendar-next a svg,
    .calendar .calendar-inner .calendar-controls .calendar-prev a svg {
      height: 20px;
      width: 20px;
    }

    .calendar .calendar-inner .calendar-controls .calendar-next a svg path,
    .calendar .calendar-inner .calendar-controls .calendar-prev a svg path {
      fill: var(--next-prev-arrow-color);
    }

    .calendar .calendar-inner .calendar-body .prev-dates,
    .calendar .calendar-inner .calendar-body .next-dates {
      color: var(--calendar-prevnext-date-color);
    }

    .calendar .calendar-inner .calendar-body .prev-dates:hover,
    .calendar .calendar-inner .calendar-body .next-dates:hover {
      border: 1px solid transparent;
      pointer-events: none;
    }
  </style>
</head>

<body>
  {{- partial "alert.html" . -}}

  {{- partial "header.html" . -}}

  <div class="scroll-top rounded-full">
    <span class="icon-keyboard_arrow_up text-2xl"></span>
  </div>

  <!-- TODO on click in calendar, use the date in the input down below. -->

  <div class="calendar"></div>


  <div class="mx-auto my-10 max-w-6xl">
    <div class="mx-3 col-span-3 lg:col-span-2 px-2">
      <h1 class="title text-5xl mb-4">{{ .Title }}</h1>
      <div class="content prose md:prose-lg lg:prose-xl max-w-none py-1">{{ .Content }}</div>

      <form name="contact" action="https://getform.io/" method="POST">

        <!-- Vielleicht die Daten rechts vom Kalender anzeigen -->
        <label for="start">Startdatum:</label>

        <div class="input">
          <input type="date" id="start" name="start" value="2018-07-22" min="2023-01-01" max="2025-12-31"
            class="p-4 bg-gray-200 border border-gray-200 focus:outline-none focus:bg-white focus:border-gray-500"
            required>
        </div>

        <label for="end">Enddatum:</label>

        <div class="input">
          <input type="date" id="end" name="end" value="2018-07-22" min="2023-01-01" max="2025-12-31"
            class="p-4 bg-gray-200 border border-gray-200 focus:outline-none focus:bg-white focus:border-gray-500"
            required>
        </div>

        <div class="input">
          <input type="text" placeholder="Name" name="name"
            class="p-4 bg-gray-200 border border-gray-200 focus:outline-none focus:bg-white focus:border-gray-500"
            required>
        </div>
        <div class="input">
          <input type="text" placeholder="Email" name="mail"
            class="p-4 bg-gray-200 border border-gray-200 focus:outline-none focus:bg-white focus:border-gray-500"
            required>
        </div>
        <div class="input">
          <input type="text" placeholder="Title" name="title"
            class="p-4 bg-gray-200 border border-gray-200 focus:outline-none focus:bg-white focus:border-gray-500"
            required>
        </div>
        <div class="input">
          <textarea rows="5" cols="30" placeholder="Message" name="message"
            class="p-4 bg-gray-200 border border-gray-200 focus:outline-none focus:bg-white focus:border-gray-500"
            required></textarea>
        </div>
        <input type="submit" value="Submit"
          class="px-8 py-2 duration-200 bg-gray-800 text-white cursor-pointer transition-colors hover:bg-gray-400">
      </form>
    </div>
  </div>

  {{- partial "footer.html" . -}}
</body>

<script src="/js/calendar.js"></script>

</html>
